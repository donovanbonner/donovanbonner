name: refresh telemetry

# Regenerates assets/contribs.svg from the live contribution calendar, but only
# commits when the contribution TOTAL actually changes — so the repo log stays
# clean instead of gaining a bot commit every day the sliding window shifts.
#
# Requires a repo secret PROFILE_TOKEN: a classic PAT belonging to donovanbonner
# with the `read:user` scope (so private contributions are counted). Without it,
# the job skips cleanly rather than failing.

on:
  schedule:
    - cron: "17 8 * * 1"   # weekly, Mondays ~08:17 UTC
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh-telemetry
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch calendar and compare total
        env:
          GH_TOKEN: ${{ secrets.PROFILE_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::warning::PROFILE_TOKEN not set — skipping telemetry refresh."
            echo "skip=1" >> "$GITHUB_ENV"
            exit 0
          fi
          gh api graphql -f query='
            query {
              user(login: "donovanbonner") {
                repositories(ownerAffiliations: OWNER, isFork: false) { totalCount }
                contributionsCollection {
                  contributionCalendar {
                    totalContributions
                    weeks { contributionDays { contributionCount date weekday } }
                  }
                }
              }
            }' > /tmp/cal.json

          NEW=$(python3 -c "import json;print(json.load(open('/tmp/cal.json'))['data']['user']['contributionsCollection']['contributionCalendar']['totalContributions'])")
          OLD=$(grep -oE 'total=[0-9]+' assets/contribs.svg | head -1 | grep -oE '[0-9]+' || echo "")
          echo "new total=$NEW  old total=${OLD:-none}"
          echo "new_total=$NEW" >> "$GITHUB_ENV"
          if [ "$NEW" = "$OLD" ]; then
            echo "contribution total unchanged — nothing to commit."
            echo "skip=1" >> "$GITHUB_ENV"
          fi

      - name: Regenerate and commit
        if: env.skip != '1'
        run: |
          python3 scripts/gen_telemetry.py
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/contribs.svg assets/dark/contribs.svg
          if git diff --cached --quiet; then
            echo "no file change"
          else
            git commit -m "chore: refresh contribution heatmap → ${new_total} [skip ci]"
            git push
          fi
